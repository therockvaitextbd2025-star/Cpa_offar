// ─── VERSION-BASED CACHE SYSTEM ─────────────────────
// Admin save করলে version বাড়ে → user এর cache invalid হয়
// No change → localStorage থেকে নেয় → 0 Supabase call
const CACHE={
  _key:(id)=>`ez_wall_${id}`,
  _vkey:(id)=>`ez_wall_v_${id}`,

  // localStorage থেকে wall data নাও
  getLocal(wallId){
    try{
      const d=localStorage.getItem(this._key(wallId));
      return d?JSON.parse(d):null;
    }catch(e){ return null; }
  },
  // localStorage এ wall data রাখো
  setLocal(wallId,data,version){
    try{
      localStorage.setItem(this._key(wallId),JSON.stringify(data));
      localStorage.setItem(this._vkey(wallId),String(version));
    }catch(e){}
  },
  // localStorage এর version
  getLocalVersion(wallId){
    return localStorage.getItem(this._vkey(wallId))||'0';
  },
  // Cache clear (admin save করলে)
  clear(wallId){
    localStorage.removeItem(this._key(wallId));
    localStorage.removeItem(this._vkey(wallId));
  },
  // Smart get: version check করে, same হলে local, আলাদা হলে Supabase
  async smartGet(wallId){
    // Supabase call নেই — শুধু S.wallData থেকে নাও
    return S.wallData[wallId]||{};
  }
};

// ─── UTILS ────────────────────────────────────────────
function $(sel){ return document.querySelector(sel); }
function $$(sel){ return document.querySelectorAll(sel); }
function el(tag,cls,html='',attrs={}){
  const e=document.createElement(tag);
  if(cls) e.className=cls;
  if(html) e.innerHTML=html;
  Object.entries(attrs).forEach(([k,v])=>e.setAttribute(k,v));
  return e;
}

// Toast
function toast(msg,type='s',dur=3200){
  const t=el('div',`tst t${type}`,`<span>${{s:'✓',e:'✕',w:'⚠',i:'ℹ'}[type]||'✓'}</span> ${msg}`);
  const c=$('#tc'); c.appendChild(t);
  setTimeout(()=>{t.style.opacity='0';t.style.transform='translateY(-5px)';setTimeout(()=>t.remove(),300)},dur);
}

// Format dollar
function fmt$(v){ return '$'+(parseFloat(v)||0).toFixed(2); }
// Format date
function fmtD(ts){ return ts?new Date(ts).toLocaleDateString():'—'; }
// Time ago
function timeAgo(ts){
  const s=(Date.now()-ts)/1000;
  if(s<60) return Math.floor(s)+'s ago';
  if(s<3600) return Math.floor(s/60)+'m ago';
  if(s<86400) return Math.floor(s/3600)+'h ago';
  return Math.floor(s/86400)+'d ago';
}
// Safe encode for keys
function encKey(k){ return k.replace(/[.#$[\]/]/g,'_'); }
// Generate ref code
function genRef(){ return Math.random().toString(36).slice(2,8).toUpperCase(); }
// Device fingerprint (basic)
function getDeviceId(){
  let id=localStorage.getItem('ez_dev');
  if(!id){
    id=[navigator.platform,screen.width,screen.height,navigator.language,new Date().getTimezoneOffset()].join('-');
    id=btoa(id).replace(/=/g,'').slice(0,20);
    localStorage.setItem('ez_dev',id);
  }
  return id;
}
// Clipboard
function copyText(txt){
  navigator.clipboard.writeText(txt).then(()=>toast(T('cpd'),'s')).catch(()=>{
    const ta=document.createElement('textarea');
    ta.value=txt;document.body.appendChild(ta);ta.select();document.execCommand('copy');ta.remove();
    toast(T('cpd'),'s');
  });
}
// Deep clone
function clone(o){ return JSON.parse(JSON.stringify(o)); }

// ─── AD SYSTEM ────────────────────────────────────────
let adTimer_=null, adSec_=0;

function startAd(wallId, type='unlock', cb=null){
  if(S.adActive){ toast('Ad already running','w'); return; }
  const now=Date.now();
  if(now-S.adLastMs < CFG.adGapMs){
    toast('Wait a moment before next ad','w');
    return;
  }
  S.adActive=true; S.adWallId=wallId; S.adType=type; S.adCallback=cb;
  adSec_=CFG.adSec;
  // Open smartlink in new tab
  window.open(CFG.smartLink,'_blank','noopener');
  // Show ad modal
  const adm=$('#adm'); adm.style.display='flex';
  // Block back button during ad
  history.pushState(null,null,location.href);
  window.onpopstate=()=>{ history.pushState(null,null,location.href); };
  // Show corner counter
  const cc=$('#cc'); cc.style.display='flex'; cc.textContent=adSec_;
  const ring=$('#adRing'); ring.style.strokeDashoffset='345';
  $('#adNum').textContent=adSec_;
  $('#adPBar').style.width='0%';
  $('#adPCt').textContent=`0 / ${CFG.adSec}${T('sec')}`;
  // Prevent closing with beforeunload
  window.onbeforeunload=()=>'Ad in progress. Do not close!';
  // Tick
  adTimer_=setInterval(()=>{
    adSec_--;
    const elapsed=CFG.adSec-adSec_;
    const pct=(elapsed/CFG.adSec)*100;
    const offset=345-(345*(elapsed/CFG.adSec));
    $('#adNum').textContent=Math.max(0,adSec_);
    $('#cc').textContent=Math.max(0,adSec_);
    if(ring) ring.style.strokeDashoffset=offset.toString();
    $('#adPBar').style.width=pct+'%';
    $('#adPCt').textContent=`${elapsed} / ${CFG.adSec}${T('sec')}`;
    if(adSec_<=0){
      clearInterval(adTimer_);
      finishAd();
    }
  },1000);
}

function finishAd(){
  S.adActive=false;
  S.adLastMs=Date.now();
  window.onbeforeunload=null;
  window.onpopstate=null;
  const adm=$('#adm'); adm.style.display='none';
  const cc=$('#cc'); cc.style.display='none';
  const type=S.adType, wallId=S.adWallId, cb=S.adCallback;
  S.adType=null; S.adWallId=null; S.adCallback=null;
  if(type==='unlock' && wallId){
    onAdCompleteForWall(wallId);
  } else if(type==='notice' && cb){
    cb();
  } else if(type==='withdraw' && cb){
    cb();
  } else if(type==='socialUnlock'){
    onAdCompleteForSocial();
  }
}

async function onAdCompleteForSocial(){
  if(!S.user) return;
  const uid=S.user.uid;
  // localStorage এ save — Supabase call নেই
  const key=`ez_ads_social_${uid}`;
  const totalAds=(parseInt(localStorage.getItem(key)||'0'))+1;
  localStorage.setItem(key, totalAds);
  if(totalAds>=5){
    const unlockAt=Date.now()+(24*60*60*1000);
    await fDB.ref(`users/${uid}/socialUnlockAt`).set(unlockAt);
    const uSnap=await fDB.ref(`users/${uid}`).once('value');
    S.userData=uSnap.val();
    localStorage.setItem(key,'0'); // reset
    toast('✅ Social Tasks unlocked for 24 hours!','s');
  } else {
    toast(`📺 ${totalAds}/5 ads watched. ${5-totalAds} more to unlock!`,'s');
  }
  render();
}

async function onAdCompleteForWall(wallId){
  if(!S.user) return;
  const uid=S.user.uid;
  // wallProgress stored as JSON object in users row
  const uSnap=await fDB.ref(`users/${uid}`).once('value');
  const ud2=uSnap.val()||{};
  const wallProgressObj=ud2.wallProgress||{};
  let prog=wallProgressObj[wallId]||{count:0,unlockedAt:0};
  const ref={
    set: async(val)=>{
      const uSnap2=await fDB.ref(`users/${uid}`).once('value');
      const ud3=uSnap2.val()||{};
      const wp=ud3.wallProgress||{};
      wp[wallId]=val;
      await fDB.ref(`users/${uid}`).update({wallProgress:wp});
    }
  };
  // Check if already unlocked and within 24h
  if(prog.unlockedAt && (Date.now()-prog.unlockedAt)<CFG.unlock24h){
    toast(T('adNote'),'s');
    render();
    return;
  }
  prog.count=(prog.count||0)+1;
  // localStorage এ ads count — UI এর জন্য
  const adsKey=`ez_ads_wall_${uid}`;
  const newCount=(parseInt(localStorage.getItem(adsKey)||'0')+1);
  localStorage.setItem(adsKey, newCount.toString());
  // Supabase এ শুধু ১ম ad এর সময় save করি — referral check এর জন্য
  if(newCount===1){
    await fDB.ref(`users/${uid}/adsWatched`).set(1);
  }
  if(prog.count>=CFG.adsPerWall){
    prog.count=0;
    prog.unlockedAt=Date.now();
    await ref.set(prog);
    toast(T('wdone'),'s');
  } else {
    await ref.set(prog);
    toast(`${T('adNote')} (${prog.count}/${CFG.adsPerWall})`,'i');
  }
  render();
}

async function loadPayoutSettings(){
  // Use cache
  let cached = EZCache.get('settings_payout');
  if(!cached){
    const snap = await fDB.ref('settings/payout').once('value');
    cached = snap.val()||{};
    EZCache.set('settings_payout', cached);
  }
  if(cached){
    S.payoutMode = cached.mode||'custom';
    S.payoutRates = cached.rates||S.payoutRates;
  }
  // Load announcement — cached
  let ann = EZCache.get('settings_announcement');
  if(ann===null || ann===undefined){
    const aSnap = await fDB.ref('settings/announcement').once('value');
    ann = aSnap.val()||'';
    EZCache.set('settings_announcement', ann);
  }
  if(ann) S.siteSettings={announcement:ann};
}

function getUserPayout(cpaAmount){
  // Admin যদি 'cpa' mode রাখে → CPA এর real amount দেবে
  if(S.payoutMode==='cpa') return parseFloat(cpaAmount)||0;
  // 'custom' mode → দেশ অনুযায়ী admin set করা amount
  const cc=S.country||'';
  if(S.payoutRates[cc]!=null) return S.payoutRates[cc];
  const hiCC=CFG.hiCC||[];
  if(hiCC.includes(cc)) return S.payoutRates.hi||0.50;
  return S.payoutRates.default||0.30;
}

async function fetchRSSOffers(wallId){

  S.rssLoading = true;
  S.rssOffers = [];
  S.rssWallId = wallId;

  const uid = S.user?.uid || '';
  const cc = S.country || '';

  // ===== LOCAL WALL CONFIG =====
  const WALLS = {

    w1:{ rssPlatform:'cpagrip' },

    w2:{ rssPlatform:'cpx' },

    w3:{ rssPlatform:'offertoro' },

    w4:{ rssPlatform:'ayet' },

    w5:{ rssPlatform:'adscend' },

    w6:{ rssPlatform:'ogads' }

  };

  // ===== LOCAL CREDENTIALS =====
  const RSS_CREDS = {

    cpagrip:{
      userId:'2441114',
      key:'7f0b09da3b2d682f1189d1d6abbf24fc'
    },

    cpx:{
      userId:'YOUR_CPX_ID',
      key:'YOUR_CPX_KEY'
    },

    offertoro:{
      userId:'YOUR_TORO_ID',
      key:'YOUR_TORO_KEY'
    },

    ayet:{
      userId:'YOUR_AYET_ID',
      key:'YOUR_AYET_KEY'
    },

    adscend:{
      userId:'YOUR_ADSCEND_ID',
      key:'YOUR_ADSCEND_KEY'
    },

    ogads:{
      userId:'YOUR_OGADS_ID',
      key:'YOUR_OGADS_KEY'
    }

  };

  // ===== GET WALL =====
  const wallCfg =
    WALLS[wallId] ||
    WALLS.w1;

  const platformId =
    wallCfg.rssPlatform;

  // ===== GET PLATFORM =====
  const platform =
    RSS_PLATFORMS[platformId];

  if(!platform){

    S.rssLoading = false;

    S.rssOffers = [
      {
        error:true,
        msg:`Platform "${platformId}" not found`
      }
    ];

    return;
  }

  // ===== GET CREDS =====
  const creds =
    RSS_CREDS[platformId] || {};

  // FIXED CHECK
  if(!creds.userId || !creds.key){

    S.rssLoading = false;

    S.rssOffers = [
      {
        error:true,
        msg:`${platform.name} credentials missing`
      }
    ];

    return;
  }

  // ===== BUILD URL =====
  const rssUrl =
    platform.buildUrl(
      creds,
      cc,
      uid
    );

  // ===== PROXY =====
  const proxyUrl =
    CFG.rssProxy +
    encodeURIComponent(rssUrl);

  try{

    const res =
      await fetch(
        proxyUrl,
        {
          signal:
            AbortSignal.timeout(9000)
        }
      );

    const txt =
      await res.text();

    const parser =
      new DOMParser();

    const xml =
      parser.parseFromString(
        txt,
        'text/xml'
      );

    const parsed =
      platform.parse(
        xml,
        cc
      );

    if(!parsed.length){

      S.rssOffers = [
        {
          empty:true,
          platform:platform.name
        }
      ];

    }else{

      S.rssOffers =
        parsed.slice(0,30);

    }

  }catch(e){

    console.error(e);

    S.rssOffers = [
      {
        error:true,
        msg:`Failed loading ${platform.name}`
      }
    ];

  }

  S.rssLoading = false;
}

// Postback listener — CPA network এ offer complete হলে এখানে আসে
async function processPostbacks(){
  if(!S.user) return;
  const uid=S.user.uid;
  try{
    // সরাসরি Supabase — uid দিয়ে unprocessed postbacks fetch
    const {data:pbs} = await sb.from('postbacks')
      .select('*').eq('uid', uid).eq('processed', false);
    if(!pbs || !pbs.length) return;

    for(const val of pbs){
      if(!val.amount) continue;
      const cpaAmt  = parseFloat(val.amount)||0;
      const userAmt = getUserPayout(cpaAmt);
      const wallId  = val.wall_id || val.wallId || 'w1';
      const offerId = val.offer_id || val.id;

      // Duplicate check — সরাসরি Supabase
      const {data:dup} = await sb.from('offers')
        .select('id').eq('uid', uid).eq('offer_id', offerId).maybeSingle();
      if(dup){
        await sb.from('postbacks').update({processed:true}).eq('id', val.id);
        continue;
      }

      // Offer save — সরাসরি Supabase
      const newOid = crypto.randomUUID ? crypto.randomUUID() : ('off_'+Date.now());
      await sb.from('offers').upsert({
        id:newOid, uid, wall_id:wallId, offer_id:offerId,
        amount:userAmt, completed_at:Date.now(), verified:true,
      }, {onConflict:'id'});

      // User earning update
      await fDB.ref(`users/${uid}/usdEarned`).transaction(v=>(v||0)+userAmt);
      await fDB.ref(`users/${uid}/offersCompleted`).transaction(v=>(v||0)+1);

      // Stats total_earned — সরাসরি Supabase
      const {data:st} = await sb.from('stats').select('total_earned').eq('id','stats').maybeSingle();
      await sb.from('stats').upsert({
        id:'stats', total_earned:(parseFloat(st?.total_earned)||0)+userAmt
      },{onConflict:'id'});

      // Today earning
      const today=new Date().toDateString();
      const todaySnap=await fDB.ref(`users/${uid}/todayDate`).once('value');
      if(todaySnap.val()!==today){
        await fDB.ref(`users/${uid}/todayDate`).set(today);
        await fDB.ref(`users/${uid}/todayEarned`).set(userAmt);
      } else {
        await fDB.ref(`users/${uid}/todayEarned`).transaction(v=>(v||0)+userAmt);
      }

      // Mark processed — সরাসরি Supabase
      await sb.from('postbacks').update({processed:true}).eq('id', val.id);

      // Monthly tracking
      trackMonthlyEarning(uid, userAmt);

      toast(`✅ Offer completed! +$${userAmt.toFixed(2)}`,'s');
    }
  }catch(e){ /* postback check error — silent in production */ }
}

function _userFromDB(row){
  if(!row) return null;
  return {
    ...row,
    // id is the Supabase primary key — also expose as uid for app compatibility
    uid: row.id ?? row.uid ?? null,
    id: row.id ?? row.uid ?? null,
    usdEarned: parseFloat(row.usd_earned ?? row.usdEarned ?? 0),
    todayEarned: parseFloat(row.today_earned ?? row.todayEarned ?? 0),
    todayDate: row.today_date ?? row.todayDate ?? '',
    adsWatched: parseInt(row.ads_watched ?? row.adsWatched ?? 0),
    offersCompleted: parseInt(row.offers_completed ?? row.offersCompleted ?? 0),
    activeReferrals: parseInt(row.active_referrals ?? row.activeReferrals ?? 0),
    isAdmin: row.is_admin ?? row.isAdmin ?? false,
    emailVerified: row.email_verified ?? row.emailVerified ?? false,
    refCode: row.ref_code ?? row.refCode ?? '',
    referredBy: row.referred_by ?? row.referredBy ?? null,
    forgotUsed: row.forgot_used ?? row.forgotUsed ?? false,
    countryEarn: parseFloat(row.country_earn ?? row.countryEarn ?? 0.30),
    deviceId: row.device_id ?? row.deviceId ?? '',
    loginStreak: parseInt(row.login_streak ?? row.loginStreak ?? 0),
    lastLoginDate: row.last_login_date ?? row.lastLoginDate ?? '',
    dailyBonusDate: row.daily_bonus_date ?? row.dailyBonusDate ?? '',
    socialUnlockAt: parseInt(row.social_unlock_at ?? row.socialUnlockAt ?? 0),
    wallProgress: row.wall_progress ?? row.wallProgress ?? {},
    readNotices: row.read_notices ?? row.readNotices ?? {},
    completedTasks: row.completed_tasks ?? row.completedTasks ?? {},
    createdAt: row.created_at ?? row.createdAt ?? 0,
  };
}

// JS camelCase → DB snake_case mapper (for writes)
function _userToDB(data){
  const m = {
    usdEarned:'usd_earned', todayEarned:'today_earned',
    todayDate:'today_date', adsWatched:'ads_watched',
    offersCompleted:'offers_completed', activeReferrals:'active_referrals',
    isAdmin:'is_admin', emailVerified:'email_verified',
    refCode:'ref_code', referredBy:'referred_by',
    forgotUsed:'forgot_used', countryEarn:'country_earn',
    deviceId:'device_id', loginStreak:'login_streak',
    lastLoginDate:'last_login_date', dailyBonusDate:'daily_bonus_date',
    socialUnlockAt:'social_unlock_at', wallProgress:'wall_progress',
    readNotices:'read_notices', completedTasks:'completed_tasks',
    createdAt:'created_at',
    // uid → id (Supabase primary key)
    uid:'id',
  };
  const result = {};
  for(const [k,v] of Object.entries(data)){
    const mapped = m[k]||k;
    result[mapped] = v;
  }
  // Ensure id is always set — uid and id must be same
  if(result.uid && !result.id) result.id = result.uid;
  if(result.id && !result.uid) result.uid = result.id;
  return result;
}

async function checkWallUnlock(wallId){
  if(!S.user) return {locked:true, count:0};
  // wallProgress stored as JSON field in users table
  const snap=await fDB.ref(`users/${S.user.uid}`).once('value');
  const ud=snap.val()||{};
  const wallProgress=ud.wallProgress||{};
  const prog=wallProgress[wallId]||{count:0,unlockedAt:0};
  const unlocked=prog.unlockedAt && (Date.now()-prog.unlockedAt)<CFG.unlock24h;
  const remaining=unlocked?Math.max(0,CFG.unlock24h-(Date.now()-prog.unlockedAt)):0;
  return {locked:!unlocked, count:prog.count||0, unlockedAt:prog.unlockedAt, remaining};
}

function msToHM(ms){
  const h=Math.floor(ms/3600000);
  const m=Math.floor((ms%3600000)/60000);
  return `${h}h ${m}m`;
}

async function doRegister(name,email,pw,refCode){
  // Device check
  const devId=getDeviceId();
  const usersSnap=await fDB.ref('users').orderByChild('device_id').equalTo(devId).once('value');
  const devUsers=usersSnap.val()||{};
  if(Object.keys(devUsers).length>=CFG.maxDevAcc){
    toast(T('mx'),'e'); return;
  }
  // Ref code validation
  let refByUid=null;
  if(refCode){
    const snap=await fDB.ref('users').orderByChild('ref_code').equalTo(refCode.toUpperCase()).once('value');
    const found=snap.val();
    if(!found){ toast(T('rnf'),'e'); return; }
    refByUid=Object.keys(found)[0];
    if(refByUid===S.user?.uid){ toast(T('rs2'),'e'); return; }
  }
  try{
    const cred=await fAuth.createUserWithEmailAndPassword(email,pw);
    const uid=cred.user.id || cred.user.uid;
    await cred.user.sendEmailVerification();
    const code=genRef();
    // ── id field MUST be the Supabase Auth UID ──
    // সব field snake_case এ — Supabase users table এর সাথে exact match
    const userData={
      id: uid,          // ← PRIMARY KEY — এটাই সবচেয়ে গুরুত্বপূর্ণ ছিল
      uid: uid,         // backward compat
      name: name||email.split('@')[0],
      email: email,
      ref_code: code,
      referred_by: refByUid||null,
      lang: S.lang,
      country: S.country||'',
      country_earn: S.countryEarn||0.30,
      usd_earned: 0,
      today_earned: 0,
      today_date: new Date().toDateString(),
      ads_watched: 0,
      offers_completed: 0,
      active_referrals: 0,
      is_admin: false,
      banned: false,
      forgot_used: false,
      device_id: devId,
      email_verified: false,
      login_streak: 0,
      last_login_date: '',
      daily_bonus_date: '',
      wall_progress: {},
      read_notices: {},
      completed_tasks: {},
      social_unlock_at: 0,
      created_at: new Date().toISOString(),
    };
    // Direct Supabase insert — fDB wrapper bypass করে সরাসরি
    const {error: insertErr} = await sb.from('users').upsert(userData, {onConflict:'id'});
    if(insertErr){
      console.error('User insert error:', insertErr);
      toast(insertErr.message,'e'); return;
    }
    // Atomic counter — total users +1
    const statsSnap = await sb.from('stats').select('total_users').eq('id','stats').maybeSingle();
    const curTotal = statsSnap.data?.total_users||0;
    await sb.from('stats').upsert({id:'stats', total_users: curTotal+1}, {onConflict:'id'});
    // Referral bonus
    if(refByUid){
      const refSnap = await sb.from('users').select('usd_earned').eq('id',refByUid).maybeSingle();
      const curEarned = parseFloat(refSnap.data?.usd_earned||0);
      await sb.from('users').update({usd_earned: curEarned + CFG.refBonus, active_referrals: (refSnap.data?.active_referrals||0)+1}).eq('id',refByUid);
    }
    EZCache.invalidateAll();
    toast(T('rs'),'s');
    S.page='verify';
    render();
  }catch(e){
    console.error('Register error:', e);
    toast(e.message||'Registration failed','e');
  }
}

async function submitWithdraw(method,account,amount){
  const ud=S.userData;
  if(!ud){ toast('Not logged in','e'); return; }
  const usd=parseFloat(amount);
  if(isNaN(usd)||usd<CFG.minUSD){
    toast(T('wf'),'e');
    // Show ad as penalty then redirect
    startAd(null,'withdraw',()=>{ S.page='wallet'; render(); });
    return;
  }
  if((ud.activeReferrals||0)<CFG.minRefs){
    toast(T('noWarn'),'w');
    startAd(null,'withdraw',()=>{ S.page='wallet'; render(); });
    return;
  }
  if((ud.usdEarned||0)<usd){
    toast(T('wf'),'e'); return;
  }
  const wid = crypto.randomUUID ? crypto.randomUUID() : ('wd_'+Date.now()+'_'+Math.random().toString(36).slice(2,8));
  await fDB.ref(`withdrawals/${wid}`).set({
    id:wid, uid:S.user.uid, user_email:ud.email, user_name:ud.name,
    method, account, amount:usd, status:'pending',
    created_at:Date.now(),

function _mapUser(u){

      if(user) fAuth.currentUser = _mapUser(user);

// ── DB wrapper — proper table-based ─────────────────
// প্রতিটা path → সঠিক Supabase table এ যাবে
const fDB = {
  ref(path){ return new SBRef(path.replace(/^\//, '')); }
};

class SBRef {
  constructor(path){ this.path = path; }

  push(){
    const key = crypto.randomUUID ? crypto.randomUUID() : ('id_'+Date.now()+'_'+Math.random().toString(36).slice(2,8));
    const child = new SBRef(this.path + '/' + key);
    child.key = key;
    // Expose set on push result
    child.parentSet = true;
    return child;
  }

  get key(){
    return this._key || this.path.split('/').pop();
  }
  set key(v){ this._key = v; }

  async set(value){
    const {table, id, field} = _parsePath(this.path);
    if(!table) return;

    if(field){
      // Field update: users/uid/fieldName
      const row = await _getRow(table, id);
      const merged = {...(row||{}), [field]: value};
      await _upsert(table, id, merged);
    } else if(id){
      // Full row set
      if(value === null || value === undefined){
        await sb.from(table).delete().eq('id', id);
      } else {
        await _upsert(table, id, {...value, id});
      }
    }
    EZCache.invalidate(this.path);
  }

  async update(updates){
    const {table, id, field} = _parsePath(this.path);
    if(!table || !id) return;
    const row = await _getRow(table, id) || {};
    const merged = {...row, ...updates, id};
    await _upsert(table, id, merged);
    EZCache.invalidate(this.path);
  }

  async remove(){
    const {table, id} = _parsePath(this.path);
    if(!table) return;
    if(id) await sb.from(table).delete().eq('id', id);
    EZCache.invalidate(this.path);
  }

  async once(event){
    const cached = EZCache.get(this.path);
    if(cached) return _snap(cached, this.path);

    const {table, id, field} = _parsePath(this.path);
    if(!table) return _snap(null, this.path);

    let value = null;

    if(field){
      const row = await _getRow(table, id);
      value = row ? row[field] ?? null : null;
    } else if(id){
      value = await _getRow(table, id);
    } else {
      // Load all rows as object
      const {data} = await sb.from(table).select('*');
      if(data && data.length){
        value = {};
        for(const row of data){
          // Map users rows to camelCase
          const mapped = table==='users' ? _userFromDB(row) : row;
          const key = mapped.id || mapped.uid || row.id;
          value[key] = mapped;
        }
      }
    }

    EZCache.set(this.path, value);
    return _snap(value, this.path);
  }

  async transaction(updateFn){
    const snap = await this.once('value');
    const current = snap.val();
    const newVal = updateFn(current);
    if(newVal !== undefined) await this.set(newVal);
    return {committed:true, snapshot:{val:()=>newVal}};
  }

  on(event, callback){
    // Initial load
    this.once('value').then(snap => callback(snap));

    const {table, id} = _parsePath(this.path);
    if(!table) return ()=>{};

    const channelName = 'rt_' + this.path.replace(/[^a-zA-Z0-9]/g,'_').slice(0,50);
    const filter = id ? `id=eq.${id}` : undefined;

    const channel = sb.channel(channelName)
      .on('postgres_changes', {
        event: '*', schema: 'public', table,
        ...(filter ? {filter} : {})
      }, async ()=>{
        EZCache.invalidate(this.path);
        const snap = await this.once('value');
        callback(snap);
      }).subscribe();

    return ()=> sb.removeChannel(channel);
  }

  off(event, unsub){ if(typeof unsub==='function') unsub(); }

  // Query methods
  orderByChild(child){ return new SBQuery(this.path, {orderBy:child}); }
  orderByValue(){ return new SBQuery(this.path, {orderBy:'__value'}); }
}

class SBQuery {
  constructor(path, opts={}){
    this.path=path; this.opts={...opts};
    this._eq=null; this._limit=null; this._limitFirst=null;
  }
  equalTo(val){ this._eq=val; return this; }
  limitToLast(n){ this._limit=n; return this; }
  limitToFirst(n){ this._limitFirst=n; return this; }
  startAt(v){ return this; }

  // Map camelCase column names to snake_case for Supabase queries
  _colMap(col){
    const m={
      deviceId:'device_id', refCode:'ref_code', referredBy:'referred_by',
      usdEarned:'usd_earned', adsWatched:'ads_watched', isAdmin:'is_admin',
      createdAt:'created_at', emailVerified:'email_verified',
      offersCompleted:'offers_completed', activeReferrals:'active_referrals',
      loginStreak:'login_streak', socialUnlockAt:'social_unlock_at',
      uid:'id',
    };
    return m[col]||col;
  }

  async once(event){
    const {table} = _parsePath(this.path);
    if(!table) return _snap(null, this.path);

    let query = sb.from(table).select('*');

    // Filter by column value — map camelCase to snake_case
    const col = this._colMap(this.opts.orderBy||'');
    if(this._eq !== null && col && col !== '__value'){
      query = query.eq(col, this._eq);
    }

    // Order
    if(col && col !== '__value'){
      const asc = !this._limit;
      query = query.order(col, {ascending: asc});
    }

    // Limit
    if(this._limit) query = query.limit(this._limit);
    if(this._limitFirst) query = query.limit(this._limitFirst);

    const {data, error} = await query;
    if(error){ console.warn('SBQuery error:', error.message); return _snap(null, this.path); }

    if(!data || !data.length) return _snap(null, this.path);

    // If limitToLast, reverse to get correct order
    const rows = this._limit ? [...data].reverse() : data;

    const obj = {};
    for(const row of rows){
      // For users table, map back to camelCase
      const mapped = table==='users' ? _userFromDB(row) : row;
      obj[mapped.id||mapped.uid||row.id] = mapped;
    }

    return _snap(obj, this.path);
  }
}

// ── Path parser ────────────────────────────────────
function _parsePath(path){
  // path examples:
  // "users"                     → table:users, id:null, field:null
  // "users/uid123"              → table:users, id:uid123, field:null
  // "users/uid123/usdEarned"    → table:users, id:uid123, field:usdEarned
  // "withdrawals"               → table:withdrawals
  // "settings/payout"           → table:settings, id:payout, field:null
  // "stats"                     → table:stats, id:stats, field:null
  // "stats/totalUsers"          → table:stats, id:stats, field:totalUsers
  // "postbacks/uid"             → table:postbacks, id:uid
  // "offers/uid/offerId"        → table:offers, id:offerId (store flat)

  const parts = path.split('/').filter(Boolean);
  if(!parts.length) return {table:null, id:null, field:null};

  const tableMap = {
    users:'users', withdrawals:'withdrawals',
    socialTasks:'social_tasks', submissions:'submissions',
    notices:'notices', offers:'offers',
    settings:'settings', stats:'stats',
    postbacks:'postbacks', walls:'walls',
    orders:'orders',
    monthlyAwards:'monthly_awards',
  };

  const rawTable = parts[0];
  const table = tableMap[rawTable] || rawTable;

  if(parts.length === 1){
    // Special: stats → single row with id='stats'
    if(rawTable==='stats') return {table:'stats', id:'stats', field:null};
    return {table, id:null, field:null};
  }

  if(parts.length === 2){
    if(rawTable==='stats') return {table:'stats', id:'stats', field:parts[1]};
    if(rawTable==='settings') return {table:'settings', id:parts[1], field:null};
    return {table, id:parts[1], field:null};
  }

  if(parts.length === 3){
    if(rawTable==='settings') return {table:'settings', id:parts[1], field:parts[2]};
    if(rawTable==='users') return {table:'users', id:parts[1], field:parts[2]};
    if(rawTable==='offers') return {table:'offers', id:parts[2], field:null};
    if(rawTable==='postbacks') return {table:'postbacks', id:parts[1]+'/'+parts[2], field:null};
    return {table, id:parts[1], field:parts[2]};
  }

  // Deeper paths: users/uid/wallProgress/wallId → store as field
  if(parts.length === 4 && rawTable==='users'){
    return {table:'users', id:parts[1], field: parts[2]+'_'+parts[3]};
  }
  if(parts.length === 4 && rawTable==='users'){
    return {table:'users', id:parts[1], field: parts[2]};
  }

  return {table, id:parts[1]||null, field:parts[2]||null};
}

async function _getRow(table, id){
  const {data, error} = await sb.from(table).select('*').eq('id', id).maybeSingle();
  if(error) console.warn('_getRow error:', table, id, error.message);
  if(table === 'users' && data) return _userFromDB(data);
  return data;
}

async function _upsert(table, id, value){
  let row = typeof value === 'object' ? {...value, id} : {id, value};
  // Convert camelCase to snake_case for users table
  if(table === 'users'){
    row = _userToDB(row);
    // Ensure id is always the Supabase Auth UID (not lost in conversion)
    if(id) row.id = id;
    // Remove uid duplicate — id is the primary key
    // keep uid field for backward compat but id must exist
  }
  // Remove undefined/null keys that might cause upsert issues
  Object.keys(row).forEach(k => { if(row[k] === undefined) delete row[k]; });
  const {error} = await sb.from(table).upsert(row, {onConflict:'id'});
  if(error) console.warn('_upsert error:', table, id, JSON.stringify(row).slice(0,120), error.message);
}

function _snap(value, path){
  return {
    val: ()=> value,
    exists: ()=> value !== null && value !== undefined,
    child: (c)=> _snap(value?.[c] ?? null, path+'/'+c),
    forEach: (cb)=>{
      if(!value || typeof value !== 'object') return;
      for(const [k,v] of Object.entries(value)) cb({key:k, val:()=>v});
    }
  };
}

const CACHE_TTL = 12 * 60 * 60 * 1000; // 12 hours in ms
const EZCache = {
  _store: {},

  set(key, value){
    this._store[key] = { value, ts: Date.now() };
  },

  get(key){
    const item = this._store[key];
    if(!item) return null;
    // Expired?
    if(Date.now() - item.ts > CACHE_TTL){
      delete this._store[key];
      return null;
    }
    return item.value;
  },

  invalidate(key){
    delete this._store[key];
  },

  invalidateAll(){
    this._store = {};
  }
};

// Smart read — cache first, Supabase only if expired or forced
async function smartRead(path, forceRefresh=false){
  const cached = EZCache.get(path);
  if(cached && !forceRefresh) return cached;
  const snap = await fDB.ref(path).once('value');
  const val = snap.val();
  EZCache.set(path, val);
  return val;
}

async function attachAuthEvents(){
  // Login
  const lgBtn=$('#lgBtn');
  if(lgBtn){
    lgBtn.onclick=async()=>{
      const email=$('#lgEm').value.trim();
      const pw=$('#lgPw').value;
      if(!email||!pw){ toast('Fill all fields','e'); return; }
      lgBtn.disabled=true;
      lgBtn.innerHTML='<span style="display:inline-flex;align-items:center;gap:8px"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" style="animation:spin .7s linear infinite"><path d="M12 2a10 10 0 0 1 10 10"/></svg> Logging in…</span>';
      await doLogin(email,pw);
      lgBtn.disabled=false;
      lgBtn.textContent=T('li');
    };
    $('#lgEye').onclick=()=>{ const p=$('#lgPw'); p.type=p.type==='password'?'text':'password'; };
    $('#lgFP').onclick=()=>{ S.page='forgot'; render(); };
    $('#lgToReg').onclick=()=>{ S.page='register'; render(); };
    $('#lgLang').onclick=()=>EZ.openLM();
  }
  // Register
  const rgBtn=$('#rgBtn');
  if(rgBtn){
    rgBtn.onclick=async()=>{
      const nm=$('#rgNm').value.trim(),em=$('#rgEm').value.trim(),
            pw=$('#rgPw').value,cpw=$('#rgCpw').value,ref=$('#rgRef').value.trim();
      if(!nm||!em||!pw){ toast('Fill all fields','e'); return; }
      if(pw.length<6){ toast('Password min 6 chars','e'); return; }
      if(pw!==cpw){ toast('Passwords do not match','e'); return; }
      rgBtn.disabled=true;
      rgBtn.innerHTML='<span style="display:inline-flex;align-items:center;gap:8px"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" style="animation:spin .7s linear infinite"><path d="M12 2a10 10 0 0 1 10 10"/></svg> Creating account…</span>';
      await doRegister(nm,em,pw,ref);
      rgBtn.disabled=false; rgBtn.textContent=T('reg');
    };
    $('#rgEye').onclick=()=>{ const p=$('#rgPw'); p.type=p.type==='password'?'text':'password'; };
    $('#rgToLi').onclick=()=>{ S.page='login'; render(); };
  }
  // Verify
  const veChk=$('#veChk');
  if(veChk){
    veChk.onclick=async()=>{
      await fAuth.currentUser?.reload();
      if(fAuth.currentUser?.emailVerified){
        await fDB.ref(`users/${fAuth.currentUser.uid}/emailVerified`).set(true);
        toast(T('veok'),'s');
        S.page='home'; render();
      } else { toast('Not verified yet. Check your email.','w'); }
    };
    $('#veRe').onclick=()=>{ sb.auth.resend({type:'signup',email:fAuth.currentUser?.email}); toast('Email sent!','s'); };
    $('#veLo').onclick=()=>doLogout();
  }
  // Forgot
  const fpBtn=$('#fpBtn');
  if(fpBtn){
    fpBtn.onclick=async()=>{
      fpBtn.disabled=true; fpBtn.textContent='Sending…';
      await doForgotPw($('#fpEm').value.trim());
      fpBtn.disabled=false; fpBtn.textContent=T('rp');
    };
    $('#fpBack').onclick=()=>{ S.page='login'; render(); };
  }
}

function renderApp(){
  if(!S.userData){ $('#app').innerHTML='<div class="ldr"><div class="sp"></div></div>'; return; }
  let html='';
  html+=buildNav();
  html+=`<div class="scr fu" id="scr">`;
  html+=`<div class="ctr" id="pgContent">`;
  // Pages
  if(S.page==='home') html+=buildHome();
  else if(S.page==='wallet') html+=buildWallet();
  else if(S.page==='offers') html+=buildOffers();
  else if(S.page==='profile') html+=buildProfile();
  else if(S.page==='admin' && S.userData.isAdmin) html+=buildAdmin();
  else if(S.page==='notices') html+=buildNotices();
  else if(S.page==='faq') html+=buildFAQ();
  else if(S.page==='social') html+=buildSocialTasks();
  else if(S.page==='unlock') html+=buildUnlock(S.unlockWallId);
  else if(S.page==='wallview') html+=buildWallView(S.unlockWallId);
  else if(S.page==='leaderboard') html+=buildLeaderboardPage();
  else html+=buildHome();
  html+=`</div></div>`;
  html+=buildBottomNav();
  $('#app').innerHTML=html;
  attachAppEvents();
  // Auto-load page data
  if(S.page==='social') loadSocialTasks();
}

async function updateUnlockUI(wallId){
  const st=await checkWallUnlock(wallId);
  const count=st.count||0;
  const locked=st.locked;
  // Dots
  for(let i=0;i<CFG.adsPerWall;i++){
    const d=$(`#ud${i}`);
    if(d){ if(!locked || i<count){ d.className='ud dn'; d.textContent='✓'; } else { d.className='ud pn'; d.textContent=i+1; } }
  }
  // Bar
  const bar=$('#ulkBar'); if(bar){ bar.style.width=(locked?(count/CFG.adsPerWall)*100:100)+'%'; }
  const lb=$('#ulkProgLb');
  if(locked && lb) lb.textContent=`${count} / ${CFG.adsPerWall} ${T('of5')}`;

  const exp=$('#ulkExpire');
  if(!locked && exp && st.remaining) exp.textContent=`${T('exp')}: ${msToHM(st.remaining)}`;

  const btn=$('#watchAdBtn');
  if(!locked){
    if(btn){ btn.textContent=T('ofl'); btn.className='btn bg'; btn.onclick=()=>{ S.page='wallview'; render(); }; }
  }
}

async function submitTaskProof(taskId, taskTitle, reward){
  const uid = S.user?.uid||'unknown';
  const email = S.user?.email||'unknown';
  const subId = 'SUB-'+Date.now();
  // Save submission to Supabase
  // Check maxWorkers — auto disable if full
  const taskSnap = await fDB.ref('socialTasks/'+taskId).once('value');
  const taskData = taskSnap.val()||{};
  const maxW = parseInt(taskData.maxWorkers||0);
  const curW = parseInt(taskData.currentWorkers||0);
  if(maxW > 0 && curW >= maxW){
    toast('This task is full. No more slots available.','w');
    return;
  }
  // Increment currentWorkers
  await fDB.ref('socialTasks/'+taskId+'/currentWorkers').transaction(v=>(v||0)+1);
  // Check again after increment — auto disable if now full
  const newCur = curW + 1;
  if(maxW > 0 && newCur >= maxW){
    await fDB.ref('socialTasks/'+taskId+'/status').set('disabled');
    EZCache.invalidate('socialTasks');
  }

  fDB.ref('submissions/'+subId).set({
    id: subId,    // ← PRIMARY KEY — Supabase এ id field লাগবে
    subId, taskId, taskTitle, reward:parseFloat(reward), uid, email,
    status:'pending', createdAt:Date.now()
  });
  // Open WhatsApp
  const WA = '8801XXXXXXXXX'; // তোমার WhatsApp number দাও
  const msg = `📱 *Social Task Proof — EarnZone Pro*\n\n*Submission ID:* ${subId}\n*Task:* ${taskTitle}\n*Reward:* $${reward}\n*User:* ${email}\n\n📸 Screenshot attached below 👇`;
  window.open('https://wa.me/'+WA+'?text='+encodeURIComponent(msg),'_blank');
  showToast('📱 Proof sent! Wait for approval.','green',4000);
}

async function loadAdminContent(){
  const c=$('#adminContent'); if(!c) return;
  if(S.adminTab==='users') await loadAdminUsers(c);
  else if(S.adminTab==='ws') await loadWithdrawals(c);
  else if(S.adminTab==='ns') loadAdminNotices(c);

}

// ─── ADMIN ORDERS ─────────────────────────────────────
async function loadAdminOrders(c){

  const orders = Object.entries(data).sort((a,b)=>b[1].createdAt-a[1].createdAt);
  if(!orders.length){ c.innerHTML='<div class="empty"><div class="ein">📭</div><div>No orders yet</div></div>'; return; }

    <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px">

    </div>

      <div>👤 <strong>${o.name}</strong> · 📞 ${o.phone}</div>
      <div>📦 Qty: <strong>${o.qty?.toLocaleString()}</strong> · 💰 <strong>$${parseFloat(o.price||0).toFixed(2)}</strong></div>

    <div style="display:flex;gap:8px;margin-top:10px">

async function updateOrder(id, status){
  await fDB.ref('orders/'+id+'/status').set(status);
  showToast(status==='approved'?'✅ Order approved!':'❌ Order rejected','green');
  loadAdminOrders($('#adminContent'));
}

async function deleteOrder(id){
  if(!confirm('Delete this order?')) return;
  await fDB.ref('orders/'+id).remove();
  showToast('🗑️ Order deleted','blue');
  loadAdminOrders($('#adminContent'));
}

  const list = Object.entries(data).sort((a,b)=>b[1].createdAt-a[1].createdAt);
  if(!list.length){ el.innerHTML='<div style="font-size:12px;color:#64748b;text-align:center;padding:10px">No pending submissions</div>'; return; }
  el.innerHTML = list.map(([id,s])=>`

    <div style="display:flex;justify-content:space-between;margin-bottom:6px">

async function approveSubmission(subId, uid, reward){
  await fDB.ref('submissions/'+subId+'/status').set('approved');
  await fDB.ref('users/'+uid+'/usdEarned').transaction(v=>(v||0)+parseFloat(reward));
  // stats total_earned — direct Supabase (snake_case)
  const {data:stRow} = await sb.from('stats').select('total_earned').eq('id','stats').maybeSingle();
  await sb.from('stats').upsert({id:'stats', total_earned:(parseFloat(stRow?.total_earned)||0)+parseFloat(reward)},{onConflict:'id'});
  trackMonthlyEarning(uid, parseFloat(reward)||0);
  // completedTasks — 4-part path fix: read full user row, update JSONB, write back
  const {data:ctRow} = await sb.from('users').select('completed_tasks').eq('id',uid).maybeSingle();
  const ct = ctRow?.completed_tasks || {};
  const subSnap = await fDB.ref('submissions/'+subId).once('value');
  const taskId = subSnap.val()?.task_id || subSnap.val()?.taskId;
  if(taskId){
    ct[taskId] = true;
    await sb.from('users').update({completed_tasks: ct}).eq('id', uid);
    EZCache.invalidate(`completedTasks_${uid}`);
  }
  showToast('✅ Approved! $'+parseFloat(reward).toFixed(2)+' added','green');
  loadPendingSubmissions();
}

  });
  // Home notice
  const hn=$('#homeNotice');
  if(hn) hn.querySelector('button').onclick=()=>{
    if(S.noticeQueue.length) viewNotice(S.noticeQueue[0]);
  };
  // Wall view — Version-based cache (0 Supabase call if no admin change)
  if(S.page==='wallview'){
    const wallId=S.unlockWallId;
    CACHE.smartGet(wallId).then(freshData=>{
      // Merge fresh data into S.wallData
      if(S.wallData[wallId]){
        Object.assign(S.wallData[wallId], freshData);
      } else {
        S.wallData[wallId]=freshData;
      }
      const w=S.wallData[wallId]||{};
      const embedMode=w.embedMode||'iframe';
      // Script Tag injection
      if(embedMode==='script' && w.scriptCode){
        const zone=document.getElementById('scriptInjectZone');
        if(zone){
          const uid=S.user?.uid||'';
          document.querySelectorAll('script[data-cpx-injected]').forEach(s=>s.remove());
          document.querySelectorAll('div[data-cpx-injected]').forEach(d=>d.remove());
          if(window.config) delete window.config;
          if(window.cpx_research) delete window.cpx_research;
          const injected=w.scriptCode.replace(/\{uid\}/g,uid);
          const wrapper=document.createElement('div');
          wrapper.innerHTML=injected;
          wrapper.querySelectorAll(':not(script)').forEach(node=>{
            const clone=node.cloneNode(true);
            clone.setAttribute('data-cpx-injected','1');
            zone.appendChild(clone);
          });
          const scripts=[...wrapper.querySelectorAll('script')];
          const execNext=(i)=>{
            if(i>=scripts.length) return;
            const oldS=scripts[i];
            const newS=document.createElement('script');
            newS.setAttribute('data-cpx-injected','1');
            if(oldS.src){
              newS.src=oldS.src+'?t='+Date.now(); // cache bust
              newS.onload=()=>execNext(i+1);
              newS.onerror=()=>execNext(i+1);
            } else {
              newS.textContent=oldS.textContent;
            }
            document.body.appendChild(newS);
            if(!oldS.src) execNext(i+1);
          };
          execNext(0);
        }
      }
      // RSS
      if(w.useRSS || embedMode==='rss'){
        fetchRSSOffers(wallId).then(()=>renderRSSOffers(wallId));
      }
      // Refresh button
      const rfBtn=document.getElementById('rssRefresh');
      if(rfBtn) rfBtn.onclick=async()=>{
        rfBtn.disabled=true; rfBtn.textContent='⏳ Loading…';
        await fetchRSSOffers(wallId);
        renderRSSOffers(wallId);
        rfBtn.disabled=false; rfBtn.textContent='🔄 Refresh';
      };
    });
  }
  // Wallet
  if(S.page==='wallet'){
    let selMethod='bkash';
    $$('[data-mth]').forEach(b=>{ b.classList.toggle('sel',b.dataset.mth==='bkash'); b.onclick=()=>{
      selMethod=b.dataset.mth; $$('[data-mth]').forEach(x=>x.classList.remove('sel')); b.classList.add('sel');
    };});
    const wdBtn=$('#wdBtn');
    if(wdBtn) wdBtn.onclick=async()=>{
      wdBtn.disabled=true; wdBtn.textContent=T('sging');
      await submitWithdraw(selMethod,$('#wdAcc').value.trim(),$('#wdAmt').value);
      wdBtn.disabled=false; wdBtn.textContent='💸 '+T('sw');
    };
    loadWithdrawHistory();
  }
  // Unlock page
  if(S.page==='unlock'){
    const watchBtn=$('#watchAdBtn');
    if(watchBtn) watchBtn.onclick=()=>{
      if(!S.adActive) startAd(S.unlockWallId,'unlock');
    };
    updateUnlockUI(S.unlockWallId);
  }
  // Profile
  if(S.page==='profile'){
    const sv=$('#prfSv'); if(sv) sv.onclick=async()=>{
      const nm=$('#prfNm').value.trim();
      if(nm) await fDB.ref(`users/${S.user.uid}/name`).set(nm);
      toast(T('sv'),'s');
    };
    const lo=$('#prfLo'); if(lo) lo.onclick=doLogout;
  // Load user awards on profile
  if(S.user) loadUserAwards(S.user.uid);
  }
  // Notices
  if(S.page==='notices') loadNotices();
  // Admin tabs
  if(S.page==='admin'){
    $$('[data-atab]').forEach(b=>b.onclick=()=>{ S.adminTab=b.dataset.atab; render(); });
    loadAdminContent();
  }
  // Admin tab content buttons re-loaded in loadAdminContent
  // Leaderboard page
  if(S.page==='leaderboard'){
    loadLeaderboard().then(()=>{
      const el=document.getElementById('lbContent');
      if(el) el.innerHTML=buildLeaderboardSection();
    });
  }
}

fAuth.onAuthStateChanged(async user=>{
  if(user){
    S.user=user;
    // Check email verified
    if(!user.emailVerified){
      S.page='verify';
      $('#ldr').style.display='none';
      $('#app').style.display='block';
      render(); return;
    }
    // Load user data
    const ud=await loadUserData(user.uid);
    if(!ud){
      // New user — wait for data to be written
      await new Promise(r=>setTimeout(r,1500));
      const ud2=await loadUserData(user.uid);
      S.userData=ud2;
    } else { S.userData=ud; }
    if(S.userData?.banned){
      toast(T('banned'),'e');
      fAuth.signOut(); S.user=null; S.userData=null;
      S.page='login';
      $('#ldr').style.display='none'; $('#app').style.display='block';
      render(); return;
    }
    // Apply user's saved language
    if(S.userData?.lang && LANGS[S.userData.lang]) applyLang(S.userData.lang);
    // Detect country
    detectCountry();
    // Load walls
    await getWallData();
    // Load payout settings
    await loadPayoutSettings();
    // Process any pending postbacks
    processPostbacks();
    // Setup realtime listeners
    setupListeners(user.uid);
    // Go to home
    if(S.page==='login'||S.page==='register'||S.page==='verify') S.page='home';
    $('#ldr').style.display='none'; $('#app').style.display='block';
    startLiveTicker();
    startActivityToasts();
    // Load real user count for nav from atomic counter
    fDB.ref('stats/total_users').once('value').then(snap=>{
      S.realUserCount = snap.val()||0;
      const el = document.getElementById('navOnlineCount');
      if(el) el.textContent = S.realUserCount;
    });
    // ── NEW FEATURES ──
    initDarkMode();
    initPWA();
    // Daily bonus + streak (non-blocking)
    if(S.userData){
      checkDailyBonus(user.uid, S.userData);
      updateLoginStreak(user.uid, S.userData);
    }
    // Preload leaderboard
    loadLeaderboard();
    // Push permission check
    S.pushEnabled = localStorage.getItem('ez_push')==='1';
    render();
  } else {
    S.user=null; S.userData=null;
    S.page='welcome';
    $('#ldr').style.display='none'; $('#app').style.display='block';
    render();
  }
});

// ── STREAK SYSTEM ──────────────────────────────────────
function getStreakData(ud){
  const today=new Date().toDateString();
  const lastLogin=ud.lastLoginDate||'';
  const yesterday=new Date(Date.now()-86400000).toDateString();
  let streak=parseInt(ud.loginStreak||0);
  // If logged in yesterday → streak continues; if today already counted → same
  // Streak update happens on login
  return {streak, today, lastLogin};
}

async function updateLoginStreak(uid, ud){
  const today=new Date().toDateString();
  if(ud.lastLoginDate===today) return; // already counted today
  const yesterday=new Date(Date.now()-86400000).toDateString();
  let streak=parseInt(ud.loginStreak||0);
  if(ud.lastLoginDate===yesterday){
    streak+=1;
  } else if(ud.lastLoginDate!==today){
    streak=1; // reset
  }
  await fDB.ref(`users/${uid}`).update({loginStreak:streak, lastLoginDate:today});
  // Streak bonus
  if(streak>0 && streak%7===0){
    const bonus=0.05;
    await fDB.ref(`users/${uid}/usdEarned`).transaction(v=>(v||0)+bonus);
    toast(`🔥 7-day streak! +$${bonus.toFixed(2)} bonus!`,'s',4000);
    sendLocalNotif('🔥 Streak Bonus!',`7-day streak! You earned +$${bonus.toFixed(2)}`);
  } else if(streak>1){
    toast(`🔥 ${streak}-day streak! Keep it up!`,'s',3000);
  }
}

// ── COUNTRY-WISE TASK FILTER ─────────────────────────
// task.country = 'ALL' → সবাই দেখবে
// task.country = 'BD'  → শুধু BD user দেখবে
// task.country = 'BD,IN,PK' → এই দেশগুলো দেখবে
function taskVisibleForUser(task){
  const tc = (task.country||'ALL').toUpperCase().trim();
  if(tc === 'ALL' || tc === '') return true;
  const userCC = (S.country||'').toUpperCase();
  if(!userCC) return true; // country detect না হলে দেখাবে
  const allowed = tc.split(',').map(x=>x.trim());
  return allowed.includes(userCC);
}

// ── MONTHLY AWARD SYSTEM ─────────────────────────────

// Current month string: "2025-01"
function currentMonth(){
  const d = new Date();
  return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0');
}

// Get month display name: "January 2025"
function monthDisplayName(m){
  if(!m) m = currentMonth();
  const [y,mo] = m.split('-');
  const names=['January','February','March','April','May','June',
    'July','August','September','October','November','December'];
  return (names[parseInt(mo)-1]||mo)+' '+y;
}

// Award amounts for rank 1, 2, 3
const AWARD_BONUS = {1: 2.00, 2: 1.00, 3: 0.50};

// ── Calculate top 3 earners for a month ──
// Uses monthEarned_{month} field in users table
// This field is updated whenever user earns during that month
async function calcMonthlyTop3(month){
  month = month || currentMonth();
  try{
    const snap = await fDB.ref('users').once('value');
    const data = snap.val()||{};
    const field = 'monthEarned_'+month.replace('-','_');

    const earners = Object.values(data)
      .filter(u => !u.banned && (u[field]||0) >= 10) // min $10
      .map(u => ({
        uid: u.uid||u.id,
        name: u.name||u.email?.split('@')[0]||'User',
        email: u.email||'',
        earned: parseFloat(u[field]||0),
      }))
      .sort((a,b) => b.earned - a.earned)
      .slice(0,3);

    return earners;
  }catch(e){
    console.warn('calcMonthlyTop3 error:', e);
    return [];
  }
}

// ── Save monthly awards to DB (admin triggers this) ──
async function generateMonthlyAwards(month){
  month = month || currentMonth();
  const top3 = await calcMonthlyTop3(month);
  if(!top3.length){
    toast('No eligible users (min $10 earned)','w');
    return;
  }
  for(let i=0; i<top3.length; i++){
    const u = top3[i];
    const rank = i+1;
    const awardId = `award_${month}_rank${rank}`;
    // Check if already exists
    const existing = await fDB.ref(`monthlyAwards/${awardId}`).once('value');
    if(existing.exists()) continue; // already generated
    await fDB.ref(`monthlyAwards/${awardId}`).set({
      id: awardId,
      month, uid: u.uid,
      user_name: u.name,
      user_email: u.email,
      rank, earned: u.earned,
      bonus: AWARD_BONUS[rank]||0,
      status: 'pending',
      created_at: Date.now(),
    });
  }
  toast(`✅ ${top3.length} award(s) generated for ${monthDisplayName(month)}`,'s');
  EZCache.invalidate('monthlyAwards');
  loadAdminAwards(document.getElementById('adminContent'));
}

// ── Admin approve award ──
async function approveAward(awardId){
  const snap = await fDB.ref(`monthlyAwards/${awardId}`).once('value');
  const award = snap.val();
  if(!award || award.status !== 'pending'){
    toast('Award not found or already processed','w'); return;
  }
  // Give bonus to user
  await fDB.ref(`users/${award.uid}/usdEarned`).transaction(v=>(v||0)+award.bonus);
  // Mark approved
  await fDB.ref(`monthlyAwards/${awardId}`).update({
    status:'approved', approvedAt: Date.now()
  });
  // Notify user (add to notices)
  const noticeId = 'notice_award_'+awardId;
  await fDB.ref(`notices/${noticeId}`).set({
    id: noticeId,
    text: `🏆 Congratulations! You won Rank #${award.rank} in ${monthDisplayName(award.month)}! +$${award.bonus.toFixed(2)} has been added to your account.`,
    created_at: Date.now(),
    posted_by: S.user?.uid||'admin',
    target_uid: award.uid,
  });
  toast(`✅ Award approved! $${award.bonus} sent to ${award.userName}`,'s');
  EZCache.invalidate('monthlyAwards');
  loadAdminAwards(document.getElementById('adminContent'));
}

// ── Admin reject award ──
async function rejectAward(awardId){
  await fDB.ref(`monthlyAwards/${awardId}`).update({status:'rejected'});
  toast('Award rejected','s');
  EZCache.invalidate('monthlyAwards');
  loadAdminAwards(document.getElementById('adminContent'));
}

// ── Load awards for admin ──
async function loadAdminAwards(c){
  if(!c) return;
  c.innerHTML = '<div class="empty"><div class="ein">⏳</div></div>';
  const month = currentMonth();

  // Load all awards
  const snap = await fDB.ref('monthlyAwards').once('value');
  const data = snap.val()||{};
  const awards = Object.values(data).sort((a,b)=>b.createdAt-a.createdAt);

  // Load current month top 3 preview
  const top3 = await calcMonthlyTop3(month);

  const rankMedal = ['🥇','🥈','🥉'];

  c.innerHTML = `
    <div class="card mb12">
      <div class="card-hd">📊 ${monthDisplayName(month)} — Current Top 3</div>
      <div style="font-size:12px;color:#64748b;margin-bottom:10px">Min $10 earned this month to qualify</div>
      ${top3.length ? top3.map((u,i)=>`
        <div style="display:flex;align-items:center;gap:10px;padding:10px;background:#f8fafc;border-radius:10px;margin-bottom:6px">
          <div style="font-size:20px">${rankMedal[i]}</div>
          <div style="flex:1">
            <div style="font-weight:700;font-size:13px">${u.name}</div>
            <div style="font-size:11px;color:#64748b">${u.email} · Earned: $${u.earned.toFixed(2)}</div>
          </div>
          <div style="font-size:12px;font-weight:700;color:#059669">+$${(AWARD_BONUS[i+1]||0).toFixed(2)}</div>
        </div>`).join('')
      : '<div style="text-align:center;padding:20px;color:#94a3b8">No users with $10+ earned this month</div>'}
      <button class="btn bp mt12" style="width:100%" onclick="generateMonthlyAwards('${month}')">
        🏆 Generate ${monthDisplayName(month)} Awards
      </button>
    </div>

    <div class="card mb12">
      <div class="card-hd">📋 All Awards</div>
      ${awards.length ? awards.map(a=>`
        <div class="award-card rank${a.rank} mb8">
          <div class="award-badge">${rankMedal[a.rank-1]||'🏆'}</div>
          <div style="font-weight:700;font-size:14px">${a.user_name||a.userName||''}</div>
          <div style="font-size:12px;color:#64748b;margin:2px 0">${a.user_email||a.userEmail||''}</div>
          <div style="font-size:12px;margin:4px 0">
            📅 ${monthDisplayName(a.month)} · 
            Rank #${a.rank} · 
            Earned: <b>$${parseFloat(a.earned).toFixed(2)}</b> · 
            Bonus: <b style="color:#059669">+$${parseFloat(a.bonus).toFixed(2)}</b>
          </div>
          <div style="display:flex;align-items:center;justify-content:space-between;margin-top:8px">
            <span class="award-status-${a.status}">${
              a.status==='approved'?'✅ Approved':
              a.status==='rejected'?'❌ Rejected':
              '⏳ Pending'
            }</span>
            ${a.status==='pending'?`
              <div style="display:flex;gap:6px">
                <button class="btn bp bsm" onclick="approveAward('${a.id}')">✅ Approve</button>
                <button class="btn bsm" style="background:#fee2e2;color:#dc2626;border:1.5px solid #fca5a5" onclick="rejectAward('${a.id}')">❌ Reject</button>
              </div>`:''}
          </div>
        </div>`).join('')
      : '<div style="text-align:center;padding:20px;color:#94a3b8">No awards yet</div>'}
    </div>`;
}

// ── Track monthly earnings ──
// Call this whenever user earns money
async function trackMonthlyEarning(uid, amount){
  const month = currentMonth();
  const field = 'monthEarned_'+month.replace('-','_');
  const snap = await fDB.ref(`users/${uid}`).once('value');
  const ud = snap.val()||{};
  const current = parseFloat(ud[field]||0);
  await fDB.ref(`users/${uid}`).update({[field]: current+amount});
}

// ── User Awards page ──
async function loadUserAwards(uid){
  const el = document.getElementById('userAwardsList');
  if(!el) return;
  el.innerHTML = '<div style="text-align:center;padding:20px">⏳ Loading…</div>';
  const snap = await fDB.ref('monthlyAwards').once('value');
  const data = snap.val()||{};
  const myAwards = Object.values(data)
    .filter(a => a.uid===uid)
    .sort((a,b)=>b.createdAt-a.createdAt);
  const rankMedal = ['🥇','🥈','🥉'];
  if(!myAwards.length){
    el.innerHTML = '<div style="text-align:center;padding:20px;color:#94a3b8">No awards yet. Earn $10+ in a month to qualify!</div>';
    return;
  }
  el.innerHTML = myAwards.map(a=>`
    <div class="award-card rank${a.rank}">
      <div class="award-badge">${rankMedal[a.rank-1]||'🏆'}</div>
      <div style="font-weight:700;font-size:15px">${rankMedal[a.rank-1]} Rank #${a.rank}</div>
      <div style="font-size:12px;color:#64748b;margin:4px 0">${monthDisplayName(a.month)}</div>
      <div style="font-size:13px">Earned: <b>$${parseFloat(a.earned).toFixed(2)}</b></div>
      <div style="font-size:13px;color:#059669;font-weight:700">Bonus: +$${parseFloat(a.bonus).toFixed(2)}</div>
      <div class="award-status-${a.status}" style="margin-top:6px">${
        a.status==='approved'?'✅ Paid':
        a.status==='rejected'?'❌ Rejected':
        '⏳ Pending approval'
      }</div>
    </div>`).join('');
}
